# Cassandra connection (DataStax Quarkus extension).
# The 'app' keyspace must already exist, cassmiggy does not create keyspaces.
# See this module's README.
quarkus.cassandra.contact-points=127.0.0.1:9042
quarkus.cassandra.local-datacenter=datacenter1

# cassmiggy adapter configuration, bound by cassmiggy-quarkus.
cassmiggy.enabled=true
cassmiggy.fail-on-error=true
cassmiggy.keyspaces[0].keyspace=app
cassmiggy.keyspaces[0].location=cql/app
